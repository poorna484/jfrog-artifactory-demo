name: Upload Build File to JFrog

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create build file
        run: |
          mkdir -p build
          echo "Build created from GitHub Actions" > build/app.txt
          zip -r app-build.zip build README.md

      - name: Upload to JFrog Artifactory
        run: |
          curl -u "${{ secrets.JF_USER }}:${{ secrets.JF_TOKEN }}" \
            -T app-build.zip \
            "${{ secrets.JF_URL }}/generic-local/github-actions/app-build-${{ github.run_number }}.zip"
